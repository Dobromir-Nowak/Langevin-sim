# Constants
D_r: 0.0067 # rotation diffusion coefficient
D: 0. # translational diffusion coefficient

# Parameters
dim: 3 # dimension of the problem
v0: 10. # ABP speed
w0: 1. # scale of angular velocity
vec_I: [0., 0., -1.] # light direction (unit vector)

# Beam parameters
axis: 0 # gradient axis (0, 1, or 2)
offset: 1. # value of the beam at the center
grad: 1. # gradient of the beam

# Simulation parameters
dt: 0.01 # time step
Nt: 40 # number of time steps
N: 10000 # number of samples/ABPs