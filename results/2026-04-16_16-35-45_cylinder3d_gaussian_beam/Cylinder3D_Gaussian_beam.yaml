# Constants
D_r: 0.067 # rotation diffusion coefficient
D: 0. # translational diffusion coefficient

# Parameters
dim: 3 # dimension of the problem
v0: 10. # ABP speed
w0: 1. # scale of angular velocity
vec_I: [0., 0., -1.] # light direction (unit vector)

# Simulation parameters
dt: 0.1 # time step
Nt: 100000 # number of time steps
N: 16000 # number of samples/ABPs

# Gaussian beam parameters
sigma_beam: 300. # width of the Gaussian beam

# Cylinder parameters
R_cylinder: 5000. # radius of the cylinder
zmin: 0. # minimum z-coordinate of the cylinder
zmax: 100. # maximum z-coordinate of the cylinder