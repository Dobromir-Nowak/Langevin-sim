# Constants
D_r: 0.067 # rotation diffusion coefficient
D: 0. # translational diffusion coefficient

# Parameters
dim: 3 # dimension of the problem
v0: 10. # ABP speed
w0: 1. # scale of angular velocity
vec_I: [-1., 0., 0.] # light direction (unit vector)

# Simulation parameters
dt: 0.01 # time step
Nt: 6000 # number of time steps
N: 32000 # number of samples/ABPs

# Saving
save_every: 20

# Boundary conditions
bc_type: "custom_bb" # "custom_bc" # boundary condition type ("bb" for standard bounce-back or "custom_bb" for custom bounce-back)
alpha: 0.28 # angle of custom bounce-back (in radians)

# # Beam parameters
# axis: 0 # gradient axis (0, 1, or 2)
# offset: 0.1 # value of the beam at the center
# grad: 0.005 # 0.01  # gradient of the beam


I: 1

# Cuboid parameters
Lx: 200. # length of the cuboid in x-direction
Ly: 2000. # length of the cuboid in y-direction
Lz: 2. # length of the cuboid in z-direction
