# Constants
D_r: 0.067 # rotation diffusion coefficient
D: 0. # translational diffusion coefficient

# Parameters
dim: 3 # dimension of the problem
v0: 10. # ABP speed
w0: 1. # scale of angular velocity
vec_I: [0., 0., -1.] # light direction (unit vector)

# Simulation parameters
dt: 0.1 # time step
Nt: 1000 # number of time steps
N: 8000 # number of samples/ABPs

# Saving
save_every: 1000

# Gaussian beam parameters
I: 1. # peak intensity
sigma_beam: 1500. # width of the Gaussian beam

# Cylinder parameters
R_cylinder: 5000. # radius of the cylinder
zmin: 0. # minimum z-coordinate of the cylinder
zmax: 100. # maximum z-coordinate of the cylinder

# Boundary conditions
bc_type: "custom_bb" # "custom_bc" # boundary condition type ("bb" for standard bounce-back or "custom_bb" for custom bounce-back)
alpha: 0.28 # angle of custom bounce-back (in radians)
